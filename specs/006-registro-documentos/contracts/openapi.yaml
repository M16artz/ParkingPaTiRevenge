openapi: 3.0.3
info:
  title: ParkingPaTi API — Registro de usuarios y envío de documentos
  version: 0.1.0
servers:
- url: http://localhost:8000
security:
- bearerAuth: []
paths:
  /api/auth/register/:
    post:
      summary: Crea persona y cuenta.
      tags:
      - 006-registro-documentos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
  /api/documentos/:
    post:
      summary: Sube documento.
      tags:
      - 006-registro-documentos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
    get:
      summary: Consulta documento propio.
      tags:
      - 006-registro-documentos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
  /api/documentos/{id}/:
    patch:
      summary: Reemplaza documento.
      tags:
      - 006-registro-documentos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
  /api/documentos/{id}/validar/:
    post:
      summary: Valida documento como administrador.
      tags:
      - 006-registro-documentos
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        detail:
          type: string
        code:
          type: string

# Extensiones de esquema sugeridas
components:
  schemas:
    Documento:
      type: object
      properties:
        id: { type: integer }
        es_valido: { type: boolean }
        fecha_expiracion: { type: string, format: date, nullable: true }
        ruta: { type: string, format: uri }
