openapi: 3.0.3
info:
  title: ParkingPaTi API — Gestión de tarifas por categoría
  version: 0.1.0
servers:
- url: http://localhost:8000
security:
- bearerAuth: []
paths:
  /api/categorias-tarifa/:
    get:
      summary: Lista categorías por parqueadero.
      tags:
      - 008-tarifas-categorias
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
    post:
      summary: Crea categoría de tarifa.
      tags:
      - 008-tarifas-categorias
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
  /api/categorias-tarifa/{id}/:
    patch:
      summary: Actualiza precio.
      tags:
      - 008-tarifas-categorias
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
    delete:
      summary: Elimina categoría.
      tags:
      - 008-tarifas-categorias
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        detail:
          type: string
        code:
          type: string

# Extensiones de esquema sugeridas
components:
  schemas:
    CategoriaTarifa:
      type: object
      required: [parqueadero, codigo, precio_hora]
      properties:
        id: { type: integer }
        parqueadero: { type: integer }
        codigo: { type: string, enum: [GENERAL, PREFERENCIAL, PESADOS] }
        precio_hora: { type: string, example: "1.50" }
