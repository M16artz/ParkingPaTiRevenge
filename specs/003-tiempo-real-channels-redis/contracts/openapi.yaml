openapi: 3.0.3
info:
  title: ParkingPaTi API — Disponibilidad en tiempo real con Channels y Redis
  version: 0.1.0
servers:
- url: http://localhost:8000
security:
- bearerAuth: []
paths:
  /api/espacios/{id}/estado/:
    patch:
      summary: Cambiar estado y emitir evento.
      tags:
      - 003-tiempo-real-channels-redis
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Operación exitosa
        '201':
          description: Recurso creado
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado
        '403':
          description: No autorizado
        '404':
          description: No encontrado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        detail:
          type: string
        code:
          type: string

# Extensiones de esquema sugeridas
components:
  schemas:
    EspacioActualizadoEvent:
      type: object
      required: [type, espacio_id, parqueadero_id, estado]
      properties:
        type: { type: string, example: "espacio_actualizado" }
        espacio_id: { type: integer, example: 42 }
        parqueadero_id: { type: integer, example: 7 }
        estado: { type: string, enum: [LIBRE, OCUPADO, INHABILITADO] }
        disponibles: { type: integer, example: 12 }

# Contrato WebSocket
# /ws/parqueaderos/{parqueadero_id}/: Suscripción a eventos de disponibilidad.
# Mensaje recibido ejemplo: {"type":"espacio_actualizado","espacio_id":1,"parqueadero_id":1,"estado":"LIBRE","disponibles":10}
